<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - LimStore</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif;}
        :root {
            --utama:#7C3AED;
            --latar:#0F1218;
            --kartu:#1A1F2B;
            --teks:#F1F5F9;
            --abu:#94A3B8;
            --sukses:#10B981;
            --bahaya:#EF4444;
            --batas:#272E3B;
        }
        body {background:var(--latar); color:var(--teks); padding:20px; min-height:100vh;}
        .login {max-width:400px; margin:60px auto; background:var(--kartu); padding:24px; border-radius:14px; border:1px solid var(--batas);}
        .login h2 {text-align:center; margin-bottom:20px; color:var(--utama);}
        .admin {display:none; max-width:500px; margin:0 auto;}
        .tombol-kembali {display:inline-block; margin-bottom:15px; color:var(--abu); text-decoration:none;}
        .menu {display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;}
        .menu button {flex:1; min-width:120px; padding:12px; border:none; border-radius:8px; background:var(--kartu); color:var(--teks); border:1px solid var(--batas); cursor:pointer; font-weight:600; transition:all 0.2s;}
        .menu button.aktif {background:var(--utama); border-color:var(--utama);}
        .menu button.merah {background:var(--bahaya); border-color:var(--bahaya);}
        .isi {display:none; background:var(--kartu); padding:20px; border-radius:14px; border:1px solid var(--batas);}
        .isi h3 {margin-bottom:15px; color:var(--utama);}
        label {display:block; font-size:14px; font-weight:600; margin-bottom:6px; margin-top:12px;}
        input {width:100%; padding:10px; border:1px solid var(--batas); border-radius:8px; background:var(--latar); color:var(--teks); font-size:15px;}
        input:focus {outline:none; border-color:var(--utama);}
        .tombol-simpan {width:100%; padding:12px; margin-top:18px; background:var(--sukses); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;}
        .baris {padding:12px; margin:10px 0; border:1px solid var(--batas); border-radius:8px;}
        .tombol-hapus {padding:8px 12px; background:var(--bahaya); color:white; border:none; border-radius:6px; margin-top:8px; cursor:pointer; font-size:13px;}
        .tombol-tambah {padding:10px; background:var(--utama); color:white; border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:600;}
    </style>
</head>
<body>

<!-- HALAMAN LOGIN -->
<div class="login" id="halLogin">
    <h2>🔐 MASUK ADMIN</h2>
    <input type="text" id="user" placeholder="Nama Pengguna">
    <input type="password" id="pass" placeholder="Kata Sandi">
    <button class="tombol-simpan" onclick="cekMasuk()">Masuk</button>
</div>

<!-- HALAMAN UTAMA ADMIN -->
<div class="admin" id="halAdmin">
    <a href="index.html" class="tombol-kembali">← Kembali ke Toko</a>
    <h2 style="margin-bottom:15px;">PANEL KELOLA TOKO</h2>

    <div class="menu">
        <button class="aktif" onclick="bukaTab('profil')">Profil & Kontak</button>
        <button onclick="bukaTab('bayar')">Cara Bayar</button>
        <button onclick="bukaTab('produk')">Produk</button>
        <button class="merah" onclick="keluar()">Keluar</button>
    </div>

    <!-- TAB PROFIL -->
    <div id="profil" class="isi" style="display:block;">
        <h3>Ubah Data Toko & Pemilik</h3>
        <label>Nama Toko:</label>
        <input type="text" id="namaToko">
        <label>Nama Pemilik Rekening/E-Wallet:</label>
        <input type="text" id="namaPemilik">
        <label>Nomor WhatsApp Kirim Bukti:</label>
        <input type="text" id="waTujuan">
        <button class="tombol-simpan" onclick="simpanProfil()">Simpan Perubahan</button>
    </div>

    <!-- TAB CARA BAYAR -->
    <div id="bayar" class="isi">
        <h3>Kelola Cara Pembayaran</h3>
        <div id="daftarMetode"></div>
        <button class="tombol-tambah" onclick="tambahMetode()">+ Tambah Cara Bayar</button>
        <button class="tombol-simpan" onclick="simpanBayar()">Simpan Semua</button>
    </div>

    <!-- TAB PRODUK -->
    <div id="produk" class="isi">
        <h3>Kelola Produk / Game</h3>
        <div id="daftarProduk"></div>
        <button class="tombol-tambah" onclick="tambahProduk()">+ Tambah Game Baru</button>
        <button class="tombol-simpan" onclick="simpanProduk()">Simpan Semua</button>
    </div>
</div>

<script>
// AKUN ADMIN (BISA DIUBAH SESUAI KEINGINAN)
const AKUN = {user:"admin", sandi:"123456"};
let pengaturan, produk;

// Cek login
function cekMasuk(){
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    if(u === AKUN.user && p === AKUN.sandi){
        localStorage.setItem('loginAdmin', 'aktif');
        document.getElementById('halLogin').style.display = 'none';
        document.getElementById('halAdmin').style.display = 'block';
        muatData();
    }else{
        alert("Nama pengguna atau sandi salah!");
    }
}

// Muat data tersimpan
function muatData(){
    const t = localStorage.getItem('dataTokoLim');
    const p = localStorage.getItem('produkLim');
    
    if(t){
        pengaturan = JSON.parse(t);
    }else{
        pengaturan = {
            namaToko: "LimStore", namaPemilik: "Mungalim", waTujuan: "087794088983",
            caraBayar: [
                {id:"gopay", nama:"GoPay", nomor:"0812xxxxxxx", aktif:true},
                {id:"dana", nama:"DANA", nomor:"0812xxxxxxx", aktif:true},
                {id:"ovo", nama:"OVO", nomor:"0812xxxxxxx", aktif:true},
                {id:"jago", nama:"Bank Jago", nomor:"12345678", aktif:true}
            ]
        };
    }

    if(p){
        produk = JSON.parse(p);
    }else{
        produk = [
            {nama:"Mobile Legends", item:"112 Diamond", harga:32000},
            {nama:"Free Fire", item:"140 Diamond", harga:28000},
            {nama:"PUBG Mobile", item:"60 UC", harga:25000}
        ];
    }

    tampilForm();
}

// Tampilkan data di form
function tampilForm(){
    document.getElementById('namaToko').value = pengaturan.namaToko;
    document.getElementById('namaPemilik').value = pengaturan.namaPemilik;
    document.getElementById('waTujuan').value = pengaturan.waTujuan;

    let htmlBayar = '';
    pengaturan.caraBayar.forEach((cb,i) => {
        htmlBayar += `<div class="baris">
            <label><input type="checkbox" id="cbAktif${i}" ${cb.aktif?'checked':''}> Tampilkan</label>
            <label>Nama Cara Bayar:</label>
            <input type="text" id="cbNama${i}" value="${cb.nama}">
            <label>Nomor / No. Rekening:</label>
            <input type="text" id="cbNomor${i}" value="${cb.nomor}">
            <button class="tombol-hapus" onclick="hapusMetode(${i})">Hapus</button>
        </div>`;
    });
    document.getElementById('daftarMetode').innerHTML = htmlBayar;

    let htmlProduk = '';
    produk.forEach((pr,i) => {
        htmlProduk += `<div class="baris">
            <label>Nama Game:</label>
            <input type="text" id="prNama${i}" value="${pr.nama}">
            <label>Isi / Item:</label>
            <input type="text" id="prItem${i}" value="${pr.item}">
            <label>Harga (Rp):</label>
            <input type="number" id="prHarga${i}" value="${pr.harga}">
            <button class="tombol-hapus" onclick="hapusProduk(${i})">Hapus</button>
        </div>`;
    });
    document.getElementById('daftarProduk').innerHTML = htmlProduk;
}

// Fungsi simpan
function simpanProfil(){
    pengaturan.namaToko = document.getElementById('namaToko').value;
    pengaturan.namaPemilik = document.getElementById('namaPemilik').value;
    pengaturan.waTujuan = document.getElementById('waTujuan').value;
    localStorage.setItem('dataTokoLim', JSON.stringify(pengaturan));
    alert("✅ Data tersimpan! Sekarang buka toko lalu REFRESH ya.");
}

function simpanBayar(){
    pengaturan.caraBayar = [];
    document.querySelectorAll('#daftarMetode .baris').forEach((b,i) => {
        pengaturan.caraBayar.push({
            id: `bayar${i}`,
            nama: document.getElementById(`cbNama${i}`).value,
            nomor: document.getElementById(`cbNomor${i}`).value,
            aktif: document.getElementById(`cbAktif${i}`).checked
        });
    });
    localStorage.setItem('dataTokoLim', JSON.stringify(pengaturan));
    alert("✅ Cara bayar tersimpan!");
}

function simpanProduk(){
    produk = [];
    document.querySelectorAll('#daftarProduk .baris').forEach((b,i) => {
        produk.push({
            nama: document.getElementById(`prNama${i}`).value,
            item: document.getElementById(`prItem${i}`).value,
            harga: parseInt(document.getElementById(`prHarga${i}`).value)
        });
    });
    localStorage.setItem('produkLim', JSON.stringify(produk));
    alert("✅ Produk tersimpan! Sekarang buka toko lalu REFRESH ya.");
}

// Fungsi tambah/hapus
function tambahMetode(){
    pengaturan.caraBayar.push({id:"baru", nama:"", nomor:"", aktif:true});
    tampilForm();
}
function hapusMetode(i){
    if(confirm("Yakin hapus cara bayar ini?")){
        pengaturan.caraBayar.splice(i,1);
        tampilForm();
    }
}
function tambahProduk(){
    produk.push({nama:"", item:"", harga:0});
    tampilForm();
}
function hapusProduk(i){
    if(confirm("Yakin hapus game ini?")){
        produk.splice(i,1);
        tampilForm();
    }
}

function bukaTab(nama){
    document.querySelectorAll('.isi').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.menu button').forEach(e => e.classList.remove('aktif'));
    document.getElementById(nama).style.display = 'block';
    event.target.classList.add('aktif');
}

function keluar(){
    localStorage.removeItem('loginAdmin');
    location.reload();
}

// Cek otomatis login
window.onload = ()=>{
    if(localStorage.getItem('loginAdmin') === 'aktif'){
        document.getElementById('halLogin').style.display = 'none';
        document.getElementById('halAdmin').style.display = 'block';
        muatData();
    }
}
</script>
</body>
</html>
