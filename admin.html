<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - LimStore</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif;}
        :root {
            --utama: #00D4FF;
            --latar: #0A0E17;
            --kartu: #131927;
            --batas: #1E293B;
            --teks: #F8FAFC;
            --abu: #94A3B8;
            --sukses: #10B981;
            --bahaya: #EF4444;
        }
        body {background:var(--latar); color:var(--teks); padding:20px; min-height:100vh;}
        .login {max-width:420px; margin:60px auto; background:var(--kartu); padding:24px; border-radius:14px; border:1px solid var(--batas);}
        .login h2 {text-align:center; margin-bottom:20px; color:var(--utama);}
        .login input {width:100%; padding:12px; margin:8px 0; border:1px solid var(--batas); border-radius:8px; background:var(--latar); color:var(--teks); font-size:15px;}
        .login button {width:100%; padding:12px; margin-top:10px; background:var(--utama); color:var(--latar); border:none; border-radius:8px; font-weight:700; cursor:pointer;}
        
        .admin {display:none; max-width:550px; margin:0 auto;}
        .kembali {display:inline-block; color:var(--utama); text-decoration:none; margin-bottom:15px;}
        .menu {display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;}
        .menu button {flex:1; min-width:100px; padding:10px; border:none; border-radius:8px; background:var(--kartu); color:var(--teks); border:1px solid var(--batas); cursor:pointer; font-weight:600;}
        .menu button.aktif {background:var(--utama); color:var(--latar); border-color:var(--utama);}
        .menu button.merah {background:var(--bahaya); border-color:var(--bahaya);}
        
        .isi {display:none; background:var(--kartu); padding:20px; border-radius:14px; border:1px solid var(--batas); margin-bottom:20px;}
        .isi h3 {margin-bottom:15px; color:var(--utama);}
        label {display:block; font-size:14px; font-weight:600; margin-bottom:6px; margin-top:12px;}
        input {width:100%; padding:10px; border:1px solid var(--batas); border-radius:8px; background:var(--latar); color:var(--teks); font-size:15px;}
        .tombol-simpan {width:100%; padding:12px; margin-top:18px; background:var(--sukses); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;}
        .baris {padding:12px; margin:10px 0; border:1px solid var(--batas); border-radius:8px;}
        .tombol-hapus {padding:6px 10px; background:var(--bahaya); color:white; border:none; border-radius:6px; margin-top:8px; cursor:pointer; font-size:13px;}
        .tombol-tambah {padding:10px; background:var(--utama); color:var(--latar); border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:600;}
        .info {font-size:13px; color:var(--abu); margin-top:5px;}
    </style>
</head>
<body>

<!-- HALAMAN LOGIN -->
<div class="login" id="halLogin">
    <h2>🔐 MASUK ADMIN</h2>
    <input type="text" id="user" placeholder="Nama Pengguna">
    <input type="password" id="pass" placeholder="Kata Sandi">
    <button onclick="cekMasuk()">Masuk</button>
</div>

<!-- HALAMAN ADMIN -->
<div class="admin" id="halAdmin">
    <a href="index.html" class="kembali">← Kembali ke Toko</a>
    <h2 style="margin-bottom:15px;">PANEL KELOLA TOKO</h2>

    <div class="menu">
        <button class="aktif" onclick="bukaTab('profil')">Profil</button>
        <button onclick="bukaTab('bayar')">Cara Bayar</button>
        <button onclick="bukaTab('game')">Kelola Game</button>
        <button class="merah" onclick="keluar()">Keluar</button>
    </div>

    <!-- TAB PROFIL -->
    <div id="profil" class="isi" style="display:block;">
        <h3>Data Toko & Pemilik</h3>
        <label>Nama Pemilik Rekening/E-Wallet:</label>
        <input type="text" id="namaPemilik">
        <label>Nomor WhatsApp Kirim Bukti:</label>
        <input type="text" id="waTujuan">
        <button class="tombol-simpan" onclick="simpanProfil()">Simpan</button>
    </div>

    <!-- TAB CARA BAYAR -->
    <div id="bayar" class="isi">
        <h3>Kelola Metode Pembayaran</h3>
        <div id="daftarMetode"></div>
        <button class="tombol-tambah" onclick="tambahMetode()">+ Tambah Metode</button>
        <button class="tombol-simpan" onclick="simpanMetode()">Simpan Semua</button>
    </div>

    <!-- TAB KELOLA GAME & NOMINAL -->
    <div id="game" class="isi">
        <h3>Tambah/Ubah/Hapus Game & Nominal</h3>
        <div class="info">💡 Tekan nama game untuk buka daftar nominalnya</div>
        <div id="daftarGameAdmin"></div>
        <button class="tombol-tambah" onclick="tambahGame()">+ Tambah Game Baru</button>
        <button class="tombol-simpan" onclick="simpanSemuaGame()">Simpan Semua Perubahan</button>
    </div>
</div>

<script>
const AKUN = {user:"admin", sandi:"123456"};
let pengaturan, dataGame;

// Cek Login
function cekMasuk(){
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    if(u === AKUN.user && p === AKUN.sandi){
        localStorage.setItem('loginAdmin', 'aktif');
        document.getElementById('halLogin').style.display = 'none';
        document.getElementById('halAdmin').style.display = 'block';
        muatData();
    }else alert("Salah nama pengguna atau sandi!");
}

// Muat Data
function muatData(){
    const t = localStorage.getItem('pengaturanToko');
    const g = localStorage.getItem('dataGame');
    
    if(t) pengaturan = JSON.parse(t);
    else pengaturan = {namaPemilik:"Mungalim", waTujuan:"087794088983", bayar:[
        {id:"gopay", nama:"GoPay", nomor:"0812xxxxxxx", aktif:true},
        {id:"dana", nama:"DANA", nomor:"0812xxxxxxx", aktif:true},
        {id:"ovo", nama:"OVO", nomor:"0812xxxxxxx", aktif:true},
        {id:"jago", nama:"Bank Jago", nomor:"12345678", aktif:true}
    ]};

    if(g) dataGame = JSON.parse(g);
    else dataGame = [
        {nama:"Mobile Legends", ikon:"⚔️", nominal:[
            {nama:"5 Diamonds", harga:1000}, {nama:"10 Diamonds", harga:2000},
            {nama:"20 Diamonds", harga:4000}, {nama:"50 Diamonds", harga:8000},
            {nama:"70 Diamonds", harga:10000}, {nama:"100 Diamonds", harga:17000},
            {nama:"140 Diamonds", harga:20000}, {nama:"150 Diamonds", harga:23000},
            {nama:"210 Diamonds", harga:31000}, {nama:"280 Diamonds", harga:41000},
            {nama:"355 Diamonds", harga:50000}, {nama:"425 Diamonds", harga:61000}
        ]},
        {nama:"Free Fire", ikon:"🔥", nominal:[
            {nama:"5 Diamond", harga:900}, {nama:"12 Diamond", harga:2500},
            {nama:"50 Diamond", harga:9500}, {nama:"140 Diamond", harga:28000},
            {nama:"7290 Diamond", harga:1400000}
        ]},
        {nama:"PUBG Mobile", ikon:"🎯", nominal:[
            {nama:"60 UC", harga:25000}, {nama:"325 UC", harga:115000},
            {nama:"660 UC", harga:230000}
        ]}
    ];

    tampilForm();
}

// Tampilkan Form
function tampilForm(){
    document.getElementById('namaPemilik').value = pengaturan.namaPemilik;
    document.getElementById('waTujuan').value = pengaturan.waTujuan;

    // Tampil Metode Bayar
    let htmlBayar = '';
    pengaturan.bayar.forEach((cb,i) => {
        htmlBayar += `<div class="baris">
            <label><input type="checkbox" id="cbAktif${i}" ${cb.aktif?'checked':''}> Tampilkan</label>
            <label>Nama Metode:</label>
            <input type="text" id="cbNama${i}" value="${cb.nama}">
            <label>Nomor/Rekening:</label>
            <input type="text" id="cbNomor${i}" value="${cb.nomor}">
            <button class="tombol-hapus" onclick="hapusMetode(${i})">Hapus</button>
        </div>`;
    });
    document.getElementById('daftarMetode').innerHTML = htmlBayar;

    // Tampil Game & Nominal
    let htmlGame = '';
    dataGame.forEach((g,i) => {
        htmlGame += `<div class="baris">
            <label>Nama Game:</label>
            <input type="text" id="gNama${i}" value="${g.nama}">
            <label>Ikon/Emoji Game:</label>
            <input type="text" id="gIkon${i}" value="${g.ikon}">
            <h4 style="margin-top:12px; color:var(--utama);">Daftar Nominal ${g.nama}:</h4>
            <div id="nominalList${i}"></div>
            <button class="tombol-tambah" style="margin-bottom:8px;" onclick="tambahNominal(${i})">+ Tambah Nominal</button>
            <button class="tombol-hapus" onclick="hapusGame(${i})">Hapus Game Ini</button>
        </div>`;
    });
    document.getElementById('daftarGameAdmin').innerHTML = htmlGame;

    // Isi daftar nominal tiap game
    dataGame.forEach((g,i) => {
        let htmlNom = '';
        g.nominal.forEach((n,j) => {
            htmlNom += `<div style="padding:8px; border-bottom:1px solid var(--batas);">
                <input type="text" placeholder="Nama Item" id="nNama${i}-${j}" value="${n.nama}" style="width:48%; margin-right:4%;">
                <input type="number" placeholder="Harga" id="nHarga${i}-${j}" value="${n.harga}" style="width:48%;">
            </div>`;
        });
        document.getElementById(`nominalList${i}`).innerHTML = htmlNom;
    });
}

// Fungsi Simpan
function simpanProfil(){
    pengaturan.namaPemilik = document.getElementById('namaPemilik').value;
    pengaturan.waTujuan = document.getElementById('waTujuan').value;
    localStorage.setItem('pengaturanToko', JSON.stringify(pengaturan));
    alert("✅ Profil tersimpan! Buka toko lalu refresh ya.");
}
function simpanMetode(){
    pengaturan.bayar = [];
    document.querySelectorAll('#daftarMetode .baris').forEach((b,i) => {
        pengaturan.bayar.push({
            id:`bayar${i}`, nama:document.getElementById(`cbNama${i}`).value,
            nomor:document.getElementById(`cbNomor${i}`).value,
            aktif:document.getElementById(`cbAktif${i}`).checked
        });
    });
    localStorage.setItem('pengaturanToko', JSON.stringify(pengaturan));
    alert("✅ Metode pembayaran tersimpan!");
}
function simpanSemuaGame(){
    dataGame = [];
    document.querySelectorAll('#daftarGameAdmin .baris').forEach((b,i) => {
        const game = {
            nama:document.getElementById(`gNama${i}`).value,
            ikon:document.getElementById(`gIkon${i}`).value,
            nominal:[]
        };
        document.querySelectorAll(`#nominalList${i} > div`).forEach((n,j) => {
            game.nominal.push({
                nama:document.getElementById(`nNama${i}-${j}`).value,
                harga:parseInt(document.getElementById(`nHarga${i}-${j}`).value)
            });
        });
        dataGame.push(game);
    });
    localStorage.setItem('dataGame', JSON.stringify(dataGame));
    alert("✅ Semua perubahan game & nominal tersimpan! Buka toko lalu refresh ya.");
}

// Fungsi Tambah/Hapus
function tambahMetode(){ pengaturan.bayar.push({id:"baru", nama:"", nomor:"", aktif:true}); tampilForm(); }
function hapusMetode(i){ if(confirm("Yakin hapus?")){ pengaturan.bayar.splice(i,1); tampilForm(); } }
function tambahGame(){ dataGame.push({nama:"Game Baru", ikon:"🎮", nominal:[{nama:"Item Baru", harga:0}]}); tampilForm(); }
function hapusGame(i){ if(confirm("Yakin hapus game ini beserta semua nominalnya?")){ dataGame.splice(i,1); tampilForm(); } }
function tambahNominal(i){ dataGame[i].nominal.push({nama:"", harga:0}); tampilForm(); }

function bukaTab(id){
    document.querySelectorAll('.isi').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.menu button').forEach(e => e.classList.remove('aktif'));
    document.getElementById(id).style.display = 'block';
    event.target.classList.add('aktif');
}
function keluar(){ localStorage.removeItem('loginAdmin'); location.reload(); }

// Cek otomatis login
window.onload = ()=>{ if(localStorage.getItem('loginAdmin') === 'aktif'){ document.getElementById('halLogin').style.display = 'none'; document.getElementById('halAdmin').style.display = 'block'; muatData(); } }
</script>
</body>
    </html>
