<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIMSTORE - Top Up Game Resmi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        :root {
            --utama: #00D4FF;
            --latar: #0A0E17;
            --kartu: #131927;
            --batas: #1E293B;
            --teks: #F8FAFC;
            --abu: #94A3B8;
            --harga: #34D399;
            --ungu: #8B5CF6;
        }
        body {
            background: var(--latar);
            color: var(--teks);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* === HALAMAN UTAMA: PILIH GAME === */
        .halaman {
            display: none;
            padding: 20px 16px;
        }
        .halaman.aktif {
            display: block;
        }

        .header {
            background: linear-gradient(135deg, var(--ungu), var(--utama));
            padding: 24px 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,212,255,0.1), transparent 60%);
        }
        .logo-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        .ikon-logo {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .nama-toko {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .tagline {
            font-size: 14px;
            margin-top: 6px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .fitur-atas {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            padding: 16px;
            margin: -16px 12px 24px;
            background: var(--kartu);
            border-radius: 12px;
            border: 1px solid var(--batas);
            position: relative;
            z-index: 2;
        }
        .item-fitur {
            text-align: center;
            flex: 1;
            font-size: 12px;
            color: var(--abu);
        }
        .item-fitur b {
            display: block;
            color: var(--teks);
            font-size: 13px;
            margin-bottom: 2px;
        }

        .judul-bagian {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            border-left: 4px solid var(--utama);
            padding-left: 10px;
        }

        .grid-game {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .kartu-game {
            background: var(--kartu);
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            border: 1px solid var(--batas);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .kartu-game:hover {
            transform: translateY(-5px);
            border-color: var(--utama);
            box-shadow: 0 8px 24px rgba(0,212,255,0.15);
        }
        .ikon-game {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .nama-game {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .isi-game {
            font-size: 13px;
            color: var(--abu);
            margin-bottom: 8px;
        }
        .harga-game {
            font-weight: 800;
            font-size: 18px;
            color: var(--harga);
        }

        /* === HALAMAN PILIH NOMINAL === */
        .tombol-kembali {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--utama);
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .tombol-kembali::before {
            content: '←';
            font-size: 18px;
        }

        .judul-nominal {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nomor-urutan {
            width: 32px;
            height: 32px;
            background: var(--utama);
            color: var(--latar);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
        }

        .grid-nominal {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .kartu-nominal {
            background: var(--kartu);
            border-radius: 12px;
            padding: 20px 16px;
            border: 2px solid var(--batas);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .kartu-nominal.aktif {
            border-color: var(--utama);
            box-shadow: 0 0 15px rgba(0,212,255,0.2);
        }
        .kartu-nominal:hover {
            border-color: var(--utama);
        }
        .nama-nominal {
            font-weight: 700;
            font-size: 17px;
            margin-bottom: 6px;
        }
        .harga-nominal {
            font-size: 16px;
            font-weight: 700;
            color: var(--utama);
        }

        .tombol-lanjut {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            padding: 14px;
            background: var(--utama);
            color: var(--latar);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .tombol-lanjut:hover {
            transform: scale(1.02);
        }
        .tombol-lanjut:disabled {
            background: var(--batas);
            color: var(--abu);
            cursor: not-allowed;
            transform: none;
        }

        .link-admin {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
        }
        .link-admin a {
            color: var(--abu);
            text-decoration: none;
        }
        .link-admin a:hover {
            color: var(--utama);
        }
    </style>
</head>
<body>

<!-- HALAMAN 1: PILIH GAME -->
<div class="halaman aktif" id="halPilihGame">
    <div class="header">
        <div class="logo-header">
            <div class="ikon-logo">🎮</div>
            <div class="nama-toko">LIMSTORE</div>
        </div>
        <div class="tagline">Top Up Game Cepat, Aman, & Paling Murah</div>
    </div>

    <div class="fitur-atas">
        <div class="item-fitur"><b>⚡ Instan</b> Masuk Detik Itu Juga</div>
        <div class="item-fitur"><b>🔐 Resmi</b> 100% Terpercaya</div>
        <div class="item-fitur"><b>💳 Lengkap</b> Semua E-Wallet & Bank</div>
        <div class="item-fitur"><b>🕒 24 Jam</b> Buka Setiap Saat</div>
    </div>

    <div class="judul-bagian">PILIH PRODUK</div>
    <div class="grid-game" id="daftarGame"></div>

    <div class="link-admin">
        <a href="admin.html">🔐 Masuk Panel Admin</a>
    </div>
</div>

<!-- HALAMAN 2: PILIH NOMINAL -->
<div class="halaman" id="halPilihNominal">
    <div class="tombol-kembali" onclick="kembaliKeGame()">Kembali Pilih Game</div>
    
    <div class="judul-nominal">
        <div class="nomor-urutan">2</div>
        PILIH NOMINAL TOP UP
    </div>

    <div class="grid-nominal" id="daftarNominal"></div>

    <button class="tombol-lanjut" id="btnLanjut" disabled>Lanjut Isi Data</button>
</div>

<script>
let gameTerpilih = null;
let nominalTerpilih = null;

// Data Nominal Sesuai Contoh Kamu
const dataNominal = {
    "Mobile Legends": [
        {nama: "5 Diamonds", harga: 1000},
        {nama: "10 Diamonds", harga: 2000},
        {nama: "20 Diamonds", harga: 4000},
        {nama: "50 Diamonds", harga: 8000},
        {nama: "70 Diamonds", harga: 10000},
        {nama: "100 Diamonds", harga: 17000},
        {nama: "140 Diamonds", harga: 20000},
        {nama: "150 Diamonds", harga: 23000},
        {nama: "210 Diamonds", harga: 31000},
        {nama: "280 Diamonds", harga: 41000},
        {nama: "355 Diamonds", harga: 50000},
        {nama: "425 Diamonds", harga: 61000}
    ],
    "Free Fire": [
        {nama: "5 Diamond", harga: 900},
        {nama: "12 Diamond", harga: 2500},
        {nama: "50 Diamond", harga: 9500},
        {nama: "140 Diamond", harga: 28000},
        {nama: "7290 Diamond", harga: 1400000}
    ],
    "PUBG Mobile": [
        {nama: "60 UC", harga: 25000},
        {nama: "325 UC", harga: 115000},
        {nama: "660 UC", harga: 230000}
    ]
};

const ikonGame = {
    "Mobile Legends": "⚔️",
    "Free Fire": "🔥",
    "PUBG Mobile": "🎯"
};

// Tampilkan Daftar Game
function tampilGame(){
    const produk = [
        {nama:"Mobile Legends", isi:"Pilih Nominal Diamond"},
        {nama:"Free Fire", isi:"Pilih Nominal Diamond"},
        {nama:"PUBG Mobile", isi:"Pilih Nominal UC"}
    ];
    let html = '';
    produk.forEach(p => {
        html += `<div class="kartu-game" onclick="bukaNominal('${p.nama}')">
                    <div class="ikon-game">${ikonGame[p.nama] || "🎮"}</div>
                    <div class="nama-game">${p.nama}</div>
                    <div class="isi-game">${p.isi}</div>
                </div>`;
    });
    document.getElementById('daftarGame').innerHTML = html;
}

// Beralih ke Halaman Nominal
function bukaNominal(namaGame){
    gameTerpilih = namaGame;
    nominalTerpilih = null;
    
    // Ganti Halaman
    document.getElementById('halPilihGame').classList.remove('aktif');
    document.getElementById('halPilihNominal').classList.add('aktif');
    
    // Tampilkan Nominal
    tampilNominal();
}

// Tampilkan Daftar Nominal
function tampilNominal(){
    const daftar = dataNominal[gameTerpilih] || [];
    let html = '';
    daftar.forEach((n, i) => {
        html += `<div class="kartu-nominal" onclick="pilihNominal(${i}, this)">
                    <div class="nama-nominal">${n.nama}</div>
                    <div class="harga-nominal">Rp ${n.harga.toLocaleString('id-ID')}</div>
                </div>`;
    });
    document.getElementById('daftarNominal').innerHTML = html;
    document.getElementById('btnLanjut').disabled = true;
}

// Pilih Salah Satu Nominal
function pilihNominal(index, elemen){
    // Hapus yang lain
    document.querySelectorAll('.kartu-nominal').forEach(e => e.classList.remove('aktif'));
    // Tandai yang dipilih
    elemen.classList.add('aktif');
    nominalTerpilih = dataNominal[gameTerpilih][index];
    // Aktifkan tombol
    document.getElementById('btnLanjut').disabled = false;
}

// Kembali ke Halaman Game
function kembaliKeGame(){
    document.getElementById('halPilihNominal').classList.remove('aktif');
    document.getElementById('halPilihGame').classList.add('aktif');
}

// Jalankan Pertama Kali
tampilGame();
</script>
</body>
</html>
