<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimStore - Top Up Game Termurah & Terpercaya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            box-sizing: border-box;
        }
        :root {
            --utama: #165DFF;
            --gelap: #0F172A;
            --abu: #64748B;
            --putih: #FFFFFF;
            --bayangan: 0 4px 20px rgba(22, 93, 255, 0.1);
            --hover: #0F4CD1;
        }
        body {
            background: #F8FAFC;
            color: var(--gelap);
            padding-bottom: 40px;
        }
        .atas {
            background: linear-gradient(135deg, var(--utama), var(--hover));
            color: var(--putih);
            padding: 20px 15px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .tagline {
            font-size: 13px;
            font-weight: 400;
            margin-top: 5px;
            opacity: 0.9;
        }
        .keunggulan {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            padding: 18px 15px;
            background: var(--putih);
            margin: -15px 15px 25px;
            border-radius: 12px;
            box-shadow: var(--bayangan);
        }
        .item-unggul {
            text-align: center;
            flex: 1 1 120px;
            font-size: 13px;
            color: var(--abu);
            font-weight: 500;
        }
        .item-unggul b {
            display: block;
            color: var(--gelap);
            font-size: 14px;
            margin-bottom: 3px;
        }
        .judul-bagian {
            font-size: 18px;
            font-weight: 700;
            margin: 0 15px 15px;
            color: var(--gelap);
            border-left: 4px solid var(--utama);
            padding-left: 10px;
        }
        .daftar-game {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 0 15px;
            margin-bottom: 25px;
        }
        .kartu-game {
            background: var(--putih);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #F1F5F9;
        }
        .kartu-game:hover {
            transform: translateY(-5px);
            box-shadow: var(--bayangan);
            border-color: var(--utama);
        }
        .nama-game {
            font-weight: 700;
            font-size: 15px;
            color: var(--gelap);
            margin-bottom: 5px;
        }
        .item-game {
            font-size: 13px;
            color: var(--abu);
            margin-bottom: 10px;
        }
        .harga-game {
            font-weight: 700;
            font-size: 16px;
            color: var(--utama);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            overflow-y: auto;
            z-index: 999;
        }
        .isi-modal {
            background: var(--putih);
            max-width: 480px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            position: relative;
        }
        .tutup {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--abu);
            transition: color 0.2s;
        }
        .tutup:hover {
            color: var(--gelap);
        }
        .isi-modal h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gelap);
            margin-bottom: 8px;
            padding-right: 30px;
        }
        .detail-item {
            color: var(--abu);
            font-size: 14px;
            margin-bottom: 5px;
        }
        .detail-harga {
            font-size: 20px;
            font-weight: 700;
            color: var(--utama);
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--gelap);
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--utama);
        }
        .judul-bayar {
            font-size: 16px;
            font-weight: 700;
            margin: 20px 0 10px;
            color: var(--gelap);
        }
        .pilihan-bayar label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .pilihan-bayar label.aktif {
            border-color: var(--utama);
            background: #EFF6FF;
            color: var(--utama);
        }
        .pilihan-bayar input {
            width: auto;
            margin: 0 10px 0 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--utama);
            color: var(--putih);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: var(--hover);
        }
        .info-bayar {
            background: #ECFDF5;
            border: 1px solid #10B981;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.7;
            color: #065F46;
        }
        .link-admin {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
        }
        .link-admin a {
            color: var(--abu);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .link-admin a:hover {
            color: var(--utama);
        }
    </style>
</head>
<body>

<div class="atas">
    LIMSTORE
    <div class="tagline">Top Up Game Cepat, Aman, & Paling Murah</div>
</div>

<div class="keunggulan">
    <div class="item-unggul"><b>⚡ Instan</b> Masuk Detik Itu Juga</div>
    <div class="item-unggul"><b>🔐 Aman</b> Data Terjamin Rahasia</div>
    <div class="item-unggul"><b>💳 Sesuai Saldo</b> GoPay/DANA/OVO/Jago</div>
    <div class="item-unggul"><b>🕒 Buka 24 Jam</b> Kapan Saja Bisa</div>
</div>

<div class="judul-bagian">PILIH GAME</div>
<div class="daftar-game" id="daftarGame"></div>

<div id="formPesan" class="modal">
    <div class="isi-modal">
        <span class="tutup" onclick="tutupPesan()">&times;</span>
        <h3 id="namaGame"></h3>
        <p class="detail-item" id="namaItem"></p>
        <p class="detail-harga" id="hargaItem"></p>
        
        <label>ID Game / User ID</label>
        <input type="text" id="idGame" placeholder="Contoh: 123456789">

        <label>Nomor WhatsApp</label>
        <input type="text" id="waPembeli" placeholder="Contoh: 081234567890">

        <h4 class="judul-bayar">Metode Pembayaran</h4>
        <div class="pilihan-bayar" id="pilihanBayar"></div>

        <button onclick="kirimPesan()">Lanjut Pembayaran</button>
        <div id="tampilInfoBayar" class="info-bayar" style="display:none;"></div>
    </div>
</div>

<div class="link-admin">
    <a href="admin.html">🔐 Masuk Panel Admin</a>
</div>

<script>
let hargaSaatIni = 0;
let pengaturan, produk;

function ambilPengaturan(){
    const data = localStorage.getItem('pengaturanToko');
    if(data){
        pengaturan = JSON.parse(data);
    }else{
        pengaturan = {
            namaPemilik: "LimStore",
            waKamu: "0812xxxxxxx",
            bayar: [
                {id:"gopay", nama:"GoPay", nomor:"0812xxxxxxx", aktif:true},
                {id:"dana", nama:"DANA", nomor:"0812xxxxxxx", aktif:true},
                {id:"ovo", nama:"OVO", nomor:"0812xxxxxxx", aktif:true},
                {id:"jago", nama:"Bank Jago", nomor:"12345678", aktif:true}
            ]
        };
    }

    const dataProduk = localStorage.getItem('daftarProduk');
    if(dataProduk){
        produk = JSON.parse(dataProduk);
    }else{
        produk = [
            {nama:"Mobile Legends", item:"112 Diamond", harga:32000},
            {nama:"Free Fire", item:"140 Diamond", harga:28000},
            {nama:"PUBG Mobile", item:"60 UC", harga:25000}
        ];
    }
}

function tampilkanProduk(){
    let html = '';
    produk.forEach(p => {
        html += `<div class="kartu-game" onclick="bukaPesan('${p.nama}','${p.item}',${p.harga})">
                    <div class="nama-game">${p.nama}</div>
                    <div class="item-game">${p.item}</div>
                    <div class="harga-game">Rp ${p.harga.toLocaleString('id-ID')}</div>
                </div>`;
    });
    document.getElementById('daftarGame').innerHTML = html;
}

function tampilkanCaraBayar(){
    let html = '';
    let pertama = true;
    pengaturan.bayar.forEach(cb => {
        if(cb.aktif){
            html += `<label onclick="pilihBayar(this)">
                        <input type="radio" name="bayar" value="${cb.id}" ${pertama?'checked':''}> ${cb.nama}
                    </label>`;
            pertama = false;
        }
    });
    document.getElementById('pilihanBayar').innerHTML = html;
}

function bukaPesan(game, item, harga){
    document.getElementById('namaGame').textContent = 'Pesan ' + game;
    document.getElementById('namaItem').textContent = 'Paket: ' + item;
    document.getElementById('hargaItem').textContent = 'Rp ' + harga.toLocaleString('id-ID');
    hargaSaatIni = harga;
    document.getElementById('formPesan').style.display = 'block';
    document.getElementById('tampilInfoBayar').style.display = 'none';
    tampilkanCaraBayar();
}

function tutupPesan(){
    document.getElementById('formPesan').style.display = 'none';
}

function pilihBayar(label){
    document.querySelectorAll('.pilihan-bayar label').forEach(l => l.classList.remove('aktif'));
    label.classList.add('aktif');
    label.querySelector('input').checked = true;
}

function kirimPesan(){
    const idGame = document.getElementById('idGame').value;
    const waPembeli = document.getElementById('waPembeli').value;
    const caraBayar = document.querySelector('input[name="bayar"]:checked').value;

    if(!idGame){ alert("Masukkan ID Game terlebih dahulu!"); return; }
    if(!waPembeli){ alert("Masukkan nomor WhatsApp terlebih dahulu!"); return; }

    let info = "";
    pengaturan.bayar.forEach(cb => {
        if(cb.id === caraBayar){
            if(cb.id === "jago"){
                info = `<b>Silakan Lakukan Pembayaran:</b><br><br>🏦 Bank Jago<br>No. Rekening: ${cb.nomor}<br>Atas Nama: ${pengaturan.namaPemilik}`;
            }else{
                info = `<b>Silakan Lakukan Pembayaran:</b><br><br>📱 ${cb.nama}<br>Nomor: ${cb.nomor}<br>Atas Nama: ${pengaturan.namaPemilik}`;
            }
        }
    });

    info += `<br><br>💸 Total Pembayaran: <b>Rp ${hargaSaatIni.toLocaleString('id-ID')}</b>`;
    info += `<br><br>✅ Setelah berhasil bayar, silakan kirim bukti pembayaran ke WhatsApp kami: <b>${pengaturan.waKamu}</b>`;

    document.getElementById('tampilInfoBayar').innerHTML = info;
    document.getElementById('tampilInfoBayar').style.display = 'block';
    alert("Pesanan berhasil dibuat! Silakan lihat detail pembayaran di bawah.");
}

ambilPengaturan();
tampilkanProduk();
</script>
</body>
</html>
