<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIM STORE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; user-select: none; }
        :root { --utama: #0f6bcb; --gelap: #12121f; --card: #1e1e2f; --teks: #e2e8f0; --abu: #94a3b8; }
        body { background: var(--gelap); color: var(--teks); padding-bottom: 80px; min-height: 100vh; }

        /* === HEADER === */
        header { background: var(--utama); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 99; box-shadow: 0 2px 10px #0f6bcb60; }
        header h1 { font-size: 22px; color: white; }

        /* === MENU ATAS === */
        .menu-atas { display: flex; justify-content: space-around; padding: 12px; background: var(--card); margin: 10px; border-radius: 10px; }
        .tab { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: var(--abu); }
        .tab.aktif { background: var(--utama); color: white; }

        /* === DAFTAR PRODUK === */
        .judul { padding: 10px 15px; font-size: 18px; font-weight: bold; color: var(--utama); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.97); }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #2d2d3f; }
        .card .nama { padding: 8px 10px; font-size: 14px; line-height: 1.4; height: 40px; overflow: hidden; }
        .card .harga { padding: 0 10px 8px; font-size: 17px; font-weight: bold; color: var(--utama); }

        /* === MENU BAWAH === */
        .bawah { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #2d2d3f; }
        .nav { text-align: center; font-size: 12px; color: var(--abu); cursor: pointer; }
        .nav.aktif { color: var(--utama); }
        .nav span { font-size: 22px; display: block; margin-bottom: 3px; }

        /* === HALAMAN ADMIN === */
        #halAdmin { display: none; padding: 15px; }
        .form { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .form h3 { color: var(--utama); margin-bottom: 12px; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 8px; background: #2d2d3f; color: white; font-size: 15px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-simpan { background: var(--utama); color: white; margin-top: 8px; }
        .btn-hapus { background: #ef4444; color: white; }
        .daftar-admin { margin-top: 20px; }
        .item-admin { background: var(--card); padding: 10px; border-radius: 8px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

        /* === POPUP PASSWORD === */
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
        .kotak-pass { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; }
        .kotak-pass h3 { color: var(--utama); margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <h1>🛒 LIM STORE</h1>
</header>

<!-- HALAMAN UTAMA -->
<div id="halUtama">
    <div class="menu-atas">
        <div class="tab aktif">Semua Produk</div>
        <div class="tab">Terlaris</div>
    </div>

    <p class="judul">🔥 Produk Pilihan</p>
    <div class="grid" id="gridProduk"></div>
</div>

<!-- HALAMAN ADMIN PANEL -->
<div id="halAdmin">
    <div class="form">
        <h3>➕ Tambah / Edit Produk</h3>
        <input type="text" id="inNama" placeholder="Nama Barang">
        <input type="text" id="inGambar" placeholder="Link Gambar (URL)">
        <input type="number" id="inHarga" placeholder="Harga (isi angka saja)">
        <input type="text" id="inLink" placeholder="Link Produk">
        <button class="btn-simpan" onclick="simpanProduk()">💾 Simpan Produk</button>
    </div>

    <div class="daftar-admin">
        <h3>📋 Daftar Produk</h3>
        <div id="listAdmin"></div>
    </div>
</div>

<!-- MENU NAVIGASI BAWAH -->
<div class="bawah">
    <div class="nav aktif" onclick="bukaHal('utama')">
        <span>🏠</span> Beranda
    </div>
    <div class="nav" onclick="bukaHal('admin')">
        <span>⚙️</span> Admin
    </div>
</div>

<!-- POPUP PASSWORD ADMIN -->
<div id="popup">
    <div class="kotak-pass">
        <h3>Masuk Kode Admin</h3>
        <input type="password" id="passAdmin" placeholder="Masukkan kata sandi">
        <button class="btn-simpan" onclick="cekPass()">Masuk</button>
        <button style="background:#64748b; color:white; margin-top:8px" onclick="tutupPopup()">Batal</button>
    </div>
</div>

<script>
// ⚙️ Pengaturan Awal
const PASS_ADMIN = '123456'; // Ganti sandi admin terserah kamu
let produk = [];
let editIndex = null;

// Ambil data produk yang tersimpan
function muatData() {
    const simpan = localStorage.getItem('dataProdukLimstore');
    if (simpan) produk = JSON.parse(simpan);
    tampilProduk();
    tampilAdmin();
}

// Simpan data ke memori HP
function simpanData() {
    localStorage.setItem('dataProdukLimstore', JSON.stringify(produk));
}

// Tampilkan produk di halaman utama
function tampilProduk() {
    const el = document.getElementById('gridProduk');
    el.innerHTML = '';
    produk.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => window.open(p.link, '_blank');
        card.innerHTML = `
            <img src="${p.gambar}" alt="${p.nama}" onerror="this.src='https://via.placeholder.com/150/2d2d3f/ffffff?text=Gambar'">
            <div class="nama">${p.nama}</div>
            <div class="harga">Rp ${p.harga.toLocaleString('id-ID')}</div>
        `;
        el.appendChild(card);
    });
}

// Tampilkan daftar produk di halaman Admin
function tampilAdmin() {
    const el = document.getElementById('listAdmin');
    el.innerHTML = '';
    produk.forEach((p, i) => {
        const item = document.createElement('div');
        item.className = 'item-admin';
        item.innerHTML = `
            <span>${p.nama.substring(0,15)}...</span>
            <div>
                <button style="width:auto; padding:6px 10px; font-size:13px; background:#3b82f6; color:white; margin:0 3px" onclick="editProduk(${i})">Ubah</button>
                <button style="width:auto; padding:6px 10px; font-size:13px" class="btn-hapus" onclick="hapusProduk(${i})">Hapus</button>
            </div>
        `;
        el.appendChild(item);
    });
}

// Fungsi simpan produk baru / ubah
function simpanProduk() {
    const nama = document.getElementById('inNama').value.trim();
    const gambar = document.getElementById('inGambar').value.trim();
    const harga = parseInt(document.getElementById('inHarga').value);
    const link = document.getElementById('inLink').value.trim();

    if (!nama || !gambar || !harga || !link) return alert('Lengkapi semua data!');

    if (editIndex !== null) {
        produk[editIndex] = { nama, gambar, harga, link };
        editIndex = null;
    } else {
        produk.unshift({ nama, gambar, harga, link });
    }

    simpanData();
    tampilProduk();
    tampilAdmin();
    document.getElementById('inNama').value = '';
    document.getElementById('inGambar').value = '';
    document.getElementById('inHarga').value = '';
    document.getElementById('inLink').value = '';
    alert('✅ Produk berhasil disimpan!');
}

// Fungsi ubah & hapus
function editProduk(i) {
    const p = produk[i];
    document.getElementById('inNama').value = p.nama;
    document.getElementById('inGambar').value = p.gambar;
    document.getElementById('inHarga').value = p.harga;
    document.getElementById('inLink').value = p.link;
    editIndex = i;
    window.scrollTo({top:0, behavior:'smooth'});
}
function hapusProduk(i) {
    if (confirm('Yakin mau hapus produk ini?')) {
        produk.splice(i, 1);
        simpanData();
        tampilProduk();
        tampilAdmin();
    }
}

// === PENGATURAN HALAMAN & KEAMANAN ===
function bukaHal(tujuan) {
    if (tujuan === 'admin') {
        document.getElementById('popup').style.display = 'flex';
        return;
    }
    document.getElementById('halUtama').style.display = 'block';
    document.getElementById('halAdmin').style.display = 'none';
    document.querySelectorAll('.nav').forEach((n, idx) => n.classList.toggle('aktif', idx === 0));
}

function cekPass() {
    const masukan = document.getElementById('passAdmin').value;
    if (masukan === PASS_ADMIN) {
        tutupPopup();
        document.getElementById('halUtama').style.display = 'none';
        document.getElementById('halAdmin').style.display = 'block';
        document.querySelectorAll('.nav').forEach((n, idx) => n.classList.toggle('aktif', idx === 1));
        document.getElementById('passAdmin').value = '';
    } else {
        alert('❌ Kode salah!');
    }
}

function tutupPopup() {
    document.getElementById('popup').style.display = 'none';
    document.getElementById('passAdmin').value = '';
}

// Jalankan saat aplikasi dibuka
muatData();
</script>

</body>
    </html>
