<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimStore - Top Up Game Resmi</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif;}
        :root {
            --utama:#7C3AED;
            --latar:#0F1218;
            --kartu:#1A1F2B;
            --teks:#F1F5F9;
            --abu:#94A3B8;
            --sukses:#10B981;
            --batas:#272E3B;
        }
        body {background:var(--latar); color:var(--teks); min-height:100vh; padding-bottom:40px;}
        .header {background:linear-gradient(135deg, var(--utama), #9D4EDD); padding:24px 16px; text-align:center;}
        .header h1 {font-size:26px; font-weight:800; margin-bottom:4px;}
        .header p {font-size:13px; opacity:0.9;}
        .info-atas {display:flex; justify-content:space-around; gap:8px; padding:16px; margin:-16px 12px 24px; background:var(--kartu); border-radius:12px; border:1px solid var(--batas); position:relative; z-index:2;}
        .info-item {text-align:center; flex:1; font-size:11px; color:var(--abu);}
        .info-item b {display:block; color:var(--teks); font-size:13px; margin-bottom:2px;}
        .judul {font-size:18px; font-weight:700; margin:0 16px 16px; border-left:4px solid var(--utama); padding-left:10px;}
        .grid-game {display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:14px; padding:0 16px;}
        .kartu {background:var(--kartu); border-radius:14px; padding:18px 12px; text-align:center; border:1px solid var(--batas); cursor:pointer; transition:all 0.3s;}
        .kartu:hover {transform:translateY(-4px); border-color:var(--utama); box-shadow:0 8px 20px rgba(124,58,237,0.15);}
        .ikon {font-size:32px; margin-bottom:10px;}
        .nama-game {font-weight:700; font-size:15px; margin-bottom:4px;}
        .item {font-size:12px; color:var(--abu); margin-bottom:8px;}
        .harga {font-weight:800; font-size:17px; color:var(--sukses);}
        .modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,18,24,0.9); padding:20px; overflow-y:auto; z-index:999;}
        .isi-modal {background:var(--kartu); max-width:420px; margin:30px auto; padding:24px; border-radius:16px; border:1px solid var(--batas); position:relative;}
        .tutup {position:absolute; top:14px; right:18px; font-size:28px; cursor:pointer; color:var(--abu);}
        .tutup:hover {color:var(--teks);}
        .isi-modal h3 {font-size:20px; margin-bottom:6px; padding-right:30px;}
        .isi-modal .desk {font-size:14px; color:var(--abu); margin-bottom:12px;}
        .isi-modal .harga-besar {font-size:24px; font-weight:800; color:var(--sukses); margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--batas);}
        label {display:block; font-size:14px; font-weight:600; margin-bottom:6px;}
        input {width:100%; padding:12px; border:1px solid var(--batas); border-radius:8px; background:var(--latar); color:var(--teks); margin-bottom:14px; font-size:15px;}
        input:focus {outline:none; border-color:var(--utama);}
        .judul-bayar {font-size:16px; font-weight:700; margin:20px 0 10px;}
        .pilih-bayar label {display:flex; align-items:center; padding:12px; margin:6px 0; border:1px solid var(--batas); border-radius:8px; cursor:pointer; transition:all 0.2s;}
        .pilih-bayar label.aktif {border-color:var(--utama); background:rgba(124,58,237,0.1);}
        .pilih-bayar input {width:auto; margin:0 10px 0 0;}
        button {width:100%; padding:14px; background:linear-gradient(135deg, var(--utama), #9D4EDD); color:white; border:none; border-radius:8px; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; transition:transform 0.2s;}
        button:hover {transform:scale(1.02);}
        .info-bayar {background:rgba(16,185,129,0.1); border:1px solid var(--sukses); padding:16px; border-radius:8px; margin-top:18px; font-size:14px; line-height:1.7; color:#A7F3D0;}
        .link-admin {text-align:center; margin-top:30px; font-size:13px; color:var(--abu);}
        .link-admin a {color:var(--abu); text-decoration:none;}
        .link-admin a:hover {color:var(--utama);}
    </style>
</head>
<body>

<div class="header">
    <h1>LIMSTORE</h1>
    <p>Top Up Game Cepat, Aman, & Paling Murah</p>
</div>

<div class="info-atas">
    <div class="info-item"><b>⚡ Instan</b> Masuk Detik Itu Juga</div>
    <div class="info-item"><b>🔐 Aman</b> 100% Resmi</div>
    <div class="info-item"><b>💳 Semua Bayar</b> E-Wallet & Bank</div>
    <div class="info-item"><b>🕒 24 Jam</b> Buka Setiap Saat</div>
</div>

<div class="judul">PILIH PRODUK</div>
<div class="grid-game" id="daftarGame"></div>

<div id="modalPesan" class="modal">
    <div class="isi-modal">
        <span class="tutup" onclick="tutupModal()">&times;</span>
        <h3 id="namaGame"></h3>
        <p class="desk" id="deskItem"></p>
        <p class="harga-besar" id="hargaItem"></p>

        <label>ID Game / User ID</label>
        <input type="text" id="idUser" placeholder="Masukkan ID kamu di sini">

        <label>Nomor WhatsApp</label>
        <input type="text" id="waUser" placeholder="Contoh: 0812xxxxxxx">

        <h4 class="judul-bayar">Pilih Cara Bayar</h4>
        <div class="pilih-bayar" id="daftarBayar"></div>

        <button onclick="prosesPesan()">Lanjut Pembayaran</button>
        <div id="infoBayar" class="info-bayar" style="display:none;"></div>
    </div>
</div>

<div class="link-admin">
    <a href="admin.html">🔐 Masuk Panel Admin</a>
</div>

<script>
let hargaSekarang = 0;
let pengaturan, produk;

// Baca data pengaturan & produk
function bacaData(){
    const dataToko = localStorage.getItem('dataTokoLim');
    const dataProduk = localStorage.getItem('produkLim');
    
    if(dataToko){
        pengaturan = JSON.parse(dataToko);
    }else{
        pengaturan = {
            namaToko: "LimStore",
            namaPemilik: "Mungalim",
            waTujuan: "087794088983",
            caraBayar: [
                {id:"gopay", nama:"GoPay", nomor:"0812xxxxxxx", aktif:true},
                {id:"dana", nama:"DANA", nomor:"0812xxxxxxx", aktif:true},
                {id:"ovo", nama:"OVO", nomor:"0812xxxxxxx", aktif:true},
                {id:"jago", nama:"Bank Jago", nomor:"12345678", aktif:true}
            ]
        };
    }

    if(dataProduk){
        produk = JSON.parse(dataProduk);
    }else{
        produk = [
            {nama:"Mobile Legends", item:"112 Diamond", harga:32000},
            {nama:"Free Fire", item:"140 Diamond", harga:28000},
            {nama:"PUBG Mobile", item:"60 UC", harga:25000}
        ];
    }
}

// Tampilkan daftar game
function tampilGame(){
    let html = '';
    const ikon = {"Mobile Legends":"⚔️","Free Fire":"🔥","PUBG Mobile":"🎯"};
    produk.forEach(p => {
        html += `<div class="kartu" onclick="bukaModal('${p.nama}','${p.item}',${p.harga})">
                    <div class="ikon">${ikon[p.nama] || "🎮"}</div>
                    <div class="nama-game">${p.nama}</div>
                    <div class="item">${p.item}</div>
                    <div class="harga">Rp ${p.harga.toLocaleString('id-ID')}</div>
                </div>`;
    });
    document.getElementById('daftarGame').innerHTML = html;
}

// Tampilkan cara bayar
function tampilBayar(){
    let html = '';
    let pertama = true;
    pengaturan.caraBayar.forEach(cb => {
        if(cb.aktif){
            html += `<label onclick="pilihMetode(this)">
                        <input type="radio" name="metode" value="${cb.id}" ${pertama?'checked':''}> ${cb.nama}
                    </label>`;
            pertama = false;
        }
    });
    document.getElementById('daftarBayar').innerHTML = html;
}

// Buka form pesan
function bukaModal(nama, item, harga){
    document.getElementById('namaGame').textContent = 'Top Up ' + nama;
    document.getElementById('deskItem').textContent = 'Paket: ' + item;
    document.getElementById('hargaItem').textContent = 'Rp ' + harga.toLocaleString('id-ID');
    hargaSekarang = harga;
    document.getElementById('modalPesan').style.display = 'block';
    document.getElementById('infoBayar').style.display = 'none';
    tampilBayar();
}

function tutupModal(){
    document.getElementById('modalPesan').style.display = 'none';
}

function pilihMetode(label){
    document.querySelectorAll('.pilih-bayar label').forEach(l => l.classList.remove('aktif'));
    label.classList.add('aktif');
    label.querySelector('input').checked = true;
}

// Proses pesan & tampilkan data yang sudah diubah
function prosesPesan(){
    const id = document.getElementById('idUser').value;
    const wa = document.getElementById('waUser').value;
    const pilih = document.querySelector('input[name="metode"]:checked').value;

    if(!id) return alert("Isi ID Game dulu!");
    if(!wa) return alert("Isi nomor WA dulu!");

    let info = `<b>✅ Pembayaran ke:</b><br><br>`;
    pengaturan.caraBayar.forEach(cb => {
        if(cb.id === pilih){
            info += cb.id === 'jago' 
                ? `🏦 ${cb.nama}<br>No. Rekening: ${cb.nomor}<br>Atas Nama: ${pengaturan.namaPemilik}`
                : `📱 ${cb.nama}<br>Nomor: ${cb.nomor}<br>Atas Nama: ${pengaturan.namaPemilik}`;
        }
    });
    info += `<br><br>💸 Total: <b>Rp ${hargaSekarang.toLocaleString('id-ID')}</b>`;
    info += `<br><br>📲 Kirim bukti ke WA: <b>${pengaturan.waTujuan}</b>`;

    document.getElementById('infoBayar').innerHTML = info;
    document.getElementById('infoBayar').style.display = 'block';
    alert("Pesanan berhasil! Data yang kamu ubah di admin sudah terpakai ya.");
}

// Jalankan saat halaman dibuka
bacaData();
tampilGame();
</script>
</body>
</html>
