<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burung Terbang - LIM STORE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: white;
            padding: 10px;
        }
        h2 { color: #facc15; margin-bottom: 10px; }
        #gameCanvas {
            border: 3px solid #facc15;
            border-radius: 12px;
            background: linear-gradient(to bottom, #7dd3fc, #0ea5e9);
            max-width: 100%;
            height: auto;
        }
        .score-box {
            font-size: 28px;
            font-weight: bold;
            color: #facc15;
            margin: 10px 0;
            text-shadow: 2px 2px #000;
        }
        .info { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>
    <h2>🐦 Burung Terbang</h2>
    <div class="score-box">Skor: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="380" height="600"></canvas>
    <p class="info">👉 Sentuh layar atau tekan tombol untuk terbang!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // Burung
        const bird = {
            x: 80,
            y: 250,
            w: 40,
            h: 30,
            speed: 0,
            jump: -7,
            gravity: 0.35
        };

        // Pipa rintangan
        let pipes = [];
        const pipeW = 60;
        const gap = 160;
        const pipeSpeed = 2.5;
        let score = 0;
        let gameOver = false;
        let frameCount = 0;

        // Kontrol terbang
        function fly() {
            if (!gameOver) bird.speed = bird.jump;
        }
        canvas.addEventListener('touchstart', e => { e.preventDefault(); fly(); });
        document.addEventListener('keydown', fly);

        // Buat pipa baru
        function createPipe() {
            const topH = Math.random() * (canvas.height - gap - 100) + 50;
            pipes.push({ x: canvas.width, topH: topH, passed: false });
        }

        // Cek tabrakan
        function collide(pipe) {
            if (bird.x + bird.w > pipe.x && bird.x < pipe.x + pipeW) {
                if (bird.y < pipe.topH || bird.y + bird.h > pipe.topH + gap) return true;
            }
            return false;
        }

        // Gambar burung
        function drawBird() {
            ctx.fillStyle = '#facc15';
            ctx.beginPath();
            ctx.arc(bird.x + 20, bird.y + 15, 18, 0, Math.PI*2);
            ctx.fill();
            // Mata
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + 28, bird.y + 10, 4, 0, Math.PI*2);
            ctx.fill();
            // Paruh
            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.moveTo(bird.x + 38, bird.y + 15);
            ctx.lineTo(bird.x + 50, bird.y + 12);
            ctx.lineTo(bird.x + 50, bird.y + 18);
            ctx.fill();
        }

        // Gambar pipa
        function drawPipe(pipe) {
            ctx.fillStyle = '#22c55e';
            // Pipa atas
            ctx.fillRect(pipe.x, 0, pipeW, pipe.topH);
            ctx.fillRect(pipe.x - 5, pipe.topH - 25, pipeW + 10, 25);
            // Pipa bawah
            ctx.fillRect(pipe.x, pipe.topH + gap, pipeW, canvas.height - pipe.topH - gap);
            ctx.fillRect(pipe.x - 5, pipe.topH + gap, pipeW + 10, 25);
        }

        // Loop game
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#facc15';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER!', canvas.width/2, canvas.height/2 - 20);
                ctx.fillText(`Skor: ${score}`, canvas.width/2, canvas.height/2 + 20);
                ctx.font = '18px sans-serif';
                ctx.fillText('Muat ulang halaman untuk main lagi', canvas.width/2, canvas.height/2 + 60);
                return;
            }

            // Gerakan burung
            bird.speed += bird.gravity;
            bird.y += bird.speed;

            // Batas atas & bawah
            if (bird.y < 0 || bird.y + bird.h > canvas.height) {
                gameOver = true;
            }

            // Buat pipa baru tiap 100 frame
            frameCount++;
            if (frameCount % 120 === 0) createPipe();

            // Proses semua pipa
            for (let i = 0; i < pipes.length; i++) {
                const p = pipes[i];
                p.x -= pipeSpeed;
                drawPipe(p);

                if (collide(p)) gameOver = true;

                if (!p.passed && p.x + pipeW < bird.x) {
                    score++;
                    scoreEl.textContent = score;
                    p.passed = true;
                }

                if (p.x + pipeW < 0) pipes.splice(i, 1);
            }

            drawBird();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
